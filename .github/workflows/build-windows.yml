name: Build Windows Package

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows executable
        shell: cmd
        run: build.bat

      - name: Create distributable zip
        shell: pwsh
        run: |
          if (Test-Path "dist/ABET-CPE-Mapper-windows.zip") {
            Remove-Item "dist/ABET-CPE-Mapper-windows.zip" -Force
          }
          Compress-Archive -Path "dist/ABET-CPE-Mapper/*" -DestinationPath "dist/ABET-CPE-Mapper-windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ABET-CPE-Mapper-windows
          path: dist/ABET-CPE-Mapper-windows.zip
          if-no-files-found: error
